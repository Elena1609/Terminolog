kind = "api"
previewPath = "/"
title = "Терминолог"
version = "1.0.0"
id = "terminologist-web-app"

[[services]]
localPort = 5000
name = "Terminologist Web App"
paths = ["/"]

[services.development]
run = "python server.py"

[services.production]

[services.production.run]
args = ["python", "server.py"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/"
